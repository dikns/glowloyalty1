<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 6 petals rotated around centre -->
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92"/>
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92" transform="rotate(60 256 256)"/>
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92" transform="rotate(120 256 256)"/>
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92" transform="rotate(180 256 256)"/>
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92" transform="rotate(240 256 256)"/>
  <ellipse cx="256" cy="164" rx="42" ry="78" fill="white" opacity="0.92" transform="rotate(300 256 256)"/>
  <!-- Centre -->
  <circle cx="256" cy="256" r="62" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="38" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="18" fill="url(#glow)"/>
</svg>
